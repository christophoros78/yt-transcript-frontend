<!DOCTYPE html>
<html>
<head>
  <title>YouTube Transcript</title>
</head>
<body>

<h2>YouTube → Transkrypt</h2>

<input id="url" style="width:400px" placeholder="Wklej link YouTube">
<button onclick="getTranscript()">Pobierz</button>

<br><br>

<textarea id="output" style="width:100%;height:300px"></textarea>

<button onclick="copyText()">Kopiuj</button>

<script>

const API = "https://TWOJ-BACKEND.onrender.com/transcript";

async function getTranscript() {
  const url = document.getElementById("url").value;

  const res = await fetch(API + "?url=" + encodeURIComponent(url));
  const data = await res.json();

  document.getElementById("output").value = data.text || "Brak danych";
}

function copyText() {
  const t = document.getElementById("output");
  t.select();
  document.execCommand("copy");
  alert("Skopiowano!");
}

</script>

</body>
</html>

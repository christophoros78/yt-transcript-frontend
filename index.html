<!DOCTYPE html>
<html>
<head>
  <title>YouTube Transcript Tool</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 40px auto; }
    textarea { width: 100%; height: 300px; }
    button { padding: 10px; margin-top: 10px; cursor: pointer; }
  </style>
</head>
<body>

<h2>YouTube → Transkrypt</h2>

<input id="url" style="width:100%" placeholder="Wklej link YouTube">
<br><br>

<button onclick="getTranscript()">Pobierz</button>

<h3>Transkrypt:</h3>
<textarea id="output"></textarea><br>

<button onclick="copyText()">📋 Kopiuj</button>

<script>
function extractVideoID(url) {
  const match = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
  return match ? match[1] : null;
}

async function getTranscript() {
  const url = document.getElementById("url").value;
  const videoId = extractVideoID(url);

  if (!videoId) {
    alert("Nieprawidłowy link");
    return;
  }

  try {
    const res = await fetch(`https://youtubetranscript.com/?server_vid2=${videoId}`);
    const data = await res.json();

    const text = data.map(x => x.text).join(" ");
    document.getElementById("output").value = text;

  } catch (err) {
    document.getElementById("output").value = "Błąd lub brak napisów";
  }
}

function copyText() {
  const textarea = document.getElementById("output");
  textarea.select();
  document.execCommand("copy");
  alert("Skopiowano!");
}
</script>

</body>
</html>
